<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🇹🇷 Турция 2026 — Навигатор</title>
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#263348;--border:#334155;
  --text:#f1f5f9;--muted:#94a3b8;--accent:#f97316;
  --p1:#3b82f6;--p2:#f97316;--p3:#22c55e;
  --red:#ef4444;--yellow:#eab308;--green:#22c55e;--blue:#3b82f6;--purple:#a78bfa;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;gap:12px;padding:9px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  z-index:1000;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:800;white-space:nowrap}
#hdr .sub{font-size:11px;color:var(--muted);white-space:nowrap}
.hstats{display:flex;gap:14px;margin-left:auto}
.hs{text-align:center;cursor:default}
.hs .v{font-size:13px;font-weight:700;color:var(--accent)}
.hs .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
#offline-badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:20px;display:none}
#offline-badge.show{display:block}

/* ── LAYOUT ── */
#wrap{display:flex;height:calc(100vh - 45px)}

/* ── SIDEBAR ── */
#sb{width:296px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.ptabs{display:flex;border-bottom:1px solid var(--border)}
.ptab{flex:1;padding:9px 4px;text-align:center;font-size:11px;font-weight:700;
  cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;
  transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
.ptab.a{color:var(--text);border-bottom-color:var(--accent)}
.ptab:hover:not(.a){color:var(--text)}
#daylist{overflow-y:auto;flex:1}
.ditem{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .1s;position:relative}
.ditem:hover{background:rgba(255,255,255,.04)}
.ditem.a{background:rgba(249,115,22,.1);border-left:3px solid var(--accent)}
.drow{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.dnum{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;color:#fff}
.dtitle{font-size:12px;font-weight:700;flex:1;line-height:1.3}
.dkm{font-size:10px;color:var(--blue);font-weight:600;flex-shrink:0}
.dsub{font-size:10px;color:var(--muted);padding-left:34px;line-height:1.3}
.dwow{position:absolute;right:10px;top:10px;font-size:9px}

/* ── MAP AREA ── */
#mwrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}

/* ── DETAIL PANEL ── */
#det{position:absolute;right:0;top:0;bottom:0;width:360px;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:900;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .25s ease;overflow-y:auto}
#det.open{transform:translateX(0)}
.det-hdr{padding:14px 14px 12px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:10}
.det-close{position:absolute;top:12px;right:12px;background:var(--border);
  border:none;color:var(--text);width:28px;height:28px;border-radius:50%;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  line-height:1}
.det-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
  display:inline-block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.det-name{font-size:18px;font-weight:800;line-height:1.2;margin-bottom:4px}
.det-day{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:6px}
.det-desc{font-size:12px;color:#cbd5e1;line-height:1.55}
.det-body{padding:14px}
.sec-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;margin:14px 0 8px}
.hotel-card{background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;margin-bottom:7px}
.hotel-name{font-size:13px;font-weight:700;margin-bottom:3px}
.hotel-area{font-size:11px;color:var(--muted)}
.hotel-price{font-size:12px;color:var(--green);font-weight:700;margin-top:2px}
.hotel-stars{font-size:10px;color:var(--yellow)}
.att-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.att-ico{font-size:20px;flex-shrink:0;margin-top:1px}
.att-name{font-size:13px;font-weight:700;margin-bottom:2px}
.att-desc{font-size:11px;color:var(--muted);line-height:1.4}
.att-price{font-size:11px;color:var(--green);font-weight:700;margin-top:2px}
.tip-box{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);
  border-radius:10px;padding:10px 12px;font-size:12px;color:#fde68a;line-height:1.5;
  margin-top:8px}
.nav-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.nav-btn{flex:1 1 calc(50% - 4px);min-width:132px;padding:10px 8px;border-radius:10px;border:none;
  font-size:12px;font-weight:700;cursor:pointer;display:flex;
  align-items:center;justify-content:center;gap:6px;text-decoration:none}
.nav-gm{background:#4285f4;color:#fff}
.nav-ym{background:#fc3f1d;color:#fff}
.nav-osm{background:#65a30d;color:#fff}
.nav-om{background:#0f766e;color:#fff}
.nav-gm:hover{background:#3574e2}.nav-ym:hover{background:#e0351a}
.nav-osm:hover{background:#55880c}.nav-om:hover{background:#0d665f}
.alt-section{border-top:1px solid var(--border);padding-top:12px;margin-top:12px}
.alt-item{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);
  border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12px}
.alt-label{font-size:10px;color:var(--purple);font-weight:700;margin-bottom:3px}

/* ── MAP CONTROLS ── */
#ctrls{position:absolute;bottom:20px;left:12px;z-index:800;
  display:flex;flex-direction:column;gap:7px}
.cbtn{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:7px 12px;font-size:11px;font-weight:700;color:var(--text);cursor:pointer;
  transition:all .15s;display:flex;align-items:center;gap:6px;white-space:nowrap;text-decoration:none}
.cbtn:hover{background:var(--border)}
.cbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── GENERAL INFO MODAL ── */
#info-modal{position:fixed;inset:0;z-index:1600;display:none;align-items:center;
  justify-content:center;padding:22px;background:rgba(15,23,42,.72);
  backdrop-filter:blur(4px)}
#info-modal.open{display:flex}
.info-panel{width:min(920px,100%);max-height:min(820px,88vh);background:var(--surface);
  border:1px solid var(--border);border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.58);
  display:flex;flex-direction:column;overflow:hidden}
.info-hdr{position:relative;padding:15px 52px 13px 18px;border-bottom:1px solid var(--border);
  background:var(--surface)}
.info-kicker{font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:4px}
.info-title{font-size:18px;font-weight:800;line-height:1.2}
.info-close{top:13px;right:14px}
.info-body{overflow-y:auto;padding:18px 20px 22px}
.md-content{font-size:13px;line-height:1.58;color:#dbe4ef}
.md-content h1,.md-content h2,.md-content h3{line-height:1.25;color:var(--text)}
.md-content h1{font-size:24px;margin:0 0 12px}
.md-content h2{font-size:19px;margin:24px 0 10px;padding-top:8px;border-top:1px solid var(--border)}
.md-content h3{font-size:15px;margin:17px 0 8px;color:#f8fafc}
.md-content p{margin:8px 0}
.md-content strong{color:#fff;font-weight:800}
.md-content em{color:#cbd5e1}
.md-content ul,.md-content ol{margin:8px 0 10px 22px}
.md-content li{margin:4px 0}
.md-content blockquote{margin:10px 0;padding:8px 12px;border-left:3px solid var(--accent);
  background:rgba(249,115,22,.08);color:#fde68a;border-radius:0 8px 8px 0}
.md-content pre{margin:10px 0;padding:12px;overflow:auto;background:#0b1120;
  border:1px solid var(--border);border-radius:8px;color:#dbe4ef}
.md-content code{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:.92em;
  background:rgba(148,163,184,.16);border:1px solid rgba(148,163,184,.16);
  border-radius:5px;padding:1px 4px}
.md-content pre code{background:none;border:none;padding:0}
.md-table-wrap{overflow-x:auto;margin:10px 0;border:1px solid var(--border);border-radius:8px}
.md-content table{width:100%;border-collapse:collapse;min-width:560px;background:rgba(255,255,255,.02)}
.md-content th,.md-content td{padding:8px 10px;border-bottom:1px solid var(--border);
  text-align:left;vertical-align:top}
.md-content th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;
  background:rgba(255,255,255,.04)}
.md-content tr:last-child td{border-bottom:none}
.body-info-open{overflow:hidden}

/* ── LEGEND ── */
#legend{position:absolute;bottom:20px;right:12px;z-index:800;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 13px;font-size:11px}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.leg-item:last-child{margin-bottom:0}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-line{width:20px;height:3px;border-radius:2px;flex-shrink:0}

/* ── LEAFLET POPUP OVERRIDES ── */
.leaflet-popup-content-wrapper{
  background:var(--surface)!important;border:1px solid var(--border)!important;
  border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,.6)!important;
  color:var(--text)!important;min-width:200px}
.leaflet-popup-tip{background:var(--surface)!important}
.leaflet-popup-content{margin:12px 14px!important}
.pop-title{font-size:14px;font-weight:800;margin-bottom:4px}
.pop-sub{font-size:11px;color:var(--muted);margin-bottom:8px}
.pop-more{background:var(--accent);color:#fff;border:none;border-radius:8px;
  padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;width:100%}
.pop-more:hover{background:#ea6c0a}

/* ── GPS pulse ── */
@keyframes gps-pulse{0%{transform:scale(1);opacity:.8}50%{transform:scale(1.8);opacity:0}100%{transform:scale(1);opacity:.8}}
.gps-dot{width:14px;height:14px;background:#3b82f6;border-radius:50%;
  border:2px solid #fff;box-shadow:0 0 0 rgba(59,130,246,.5);
  animation:gps-pulse 2s ease-in-out infinite}
.gps-ring{width:14px;height:14px;border-radius:50%;
  background:rgba(59,130,246,.3);animation:gps-pulse 2s ease-in-out infinite}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── MOBILE ── */
@media(max-width:768px){
  #sb{position:absolute;left:-296px;top:0;bottom:0;z-index:999;
    transition:left .25s;box-shadow:4px 0 20px rgba(0,0,0,.4)}
  #sb.mob-open{left:0}
  #mob-menu{display:flex!important}
  .hstats{display:none}
  #sb-close-bar{display:flex!important}
  #det{width:100%;left:0;right:0;top:auto;bottom:0;height:82vh;
    transform:translateY(100%);border-left:none;
    border-top:1px solid var(--border);border-radius:16px 16px 0 0}
  #det.open{transform:translateY(0)}
  #legend{display:none}
  #ctrls{bottom:10px;left:8px;gap:5px}
  .cbtn{padding:7px 11px;font-size:11px}
  #info-modal{padding:8px}
  .info-panel{max-height:94vh;border-radius:12px}
  .info-hdr{padding:13px 48px 12px 14px}
  .info-title{font-size:16px}
  .info-body{padding:14px}
  .md-content{font-size:12px}
  .md-content h1{font-size:20px}
  .md-content h2{font-size:17px}
  .ditem{padding:13px 14px}
  .ptab{padding:12px 4px;font-size:12px}
  .nav-btn{padding:13px 8px;font-size:13px}
  .hotel-card{padding:12px}
  .det-name{font-size:16px}
}
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:998;
  -webkit-tap-highlight-color:transparent}
#mob-overlay.show{display:block}
#sb-close-bar{display:none;justify-content:space-between;align-items:center;
  padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
#mob-menu{display:none;background:none;border:none;color:var(--text);
  font-size:22px;cursor:pointer;padding:6px 4px;-webkit-tap-highlight-color:transparent}
.hotel-book{display:flex;align-items:center;justify-content:center;gap:5px;
  background:rgba(0,116,255,.1);border:1px solid rgba(0,116,255,.25);color:#60a5fa;
  border-radius:8px;padding:7px 10px;font-size:11px;font-weight:700;
  text-decoration:none;margin-top:7px;transition:background .15s}
.hotel-book:hover,.hotel-book:active{background:rgba(0,116,255,.25)}
</style>
</head>

# 🇹🇷 Турция 2026 — Личная инструкция
> Сентябрь 2026 · Ереван → Анталия → Западное побережье · В одну сторону · Авто Toyota Fielder · 2 чел.

---

## TL;DR

**3 фазы:**
1. **Дорога до Анталии** — 5–6 дней с ключевыми остановками (Ани/Карс + Каппадокия)
2. **Анталия-база** — 5 дней + дневные вылазки по окрестностям
3. **После Анталии** — 5–7 дней вдоль Бирюзового побережья на запад

**Итого:** ~16–18 дней  
**Финиш:** Памуккале → Бодрум/Измир (вылет домой) или Даламан (у Фетхие)  
**Бюджет:** ~$2 100–2 700 на двоих (с шаром)  
**Граница:** Баврa → Vale/Türkgözü  
**⚠️ Юго-восток НЕ ЕХАТЬ** — Level 4

---

## Маршрут — одним взглядом

```
Ереван
  ↓ граница Баврa/Ниноцминда
Ахалцихе (Грузия)
  ↓ граница Vale/Türkgözü
Карс + Ани
  ↓
Эрзурум (1 ночь транзит)
  ↓
КАППАДОКИЯ ★★★★★ (2 ночи)
  ↓
Анталия ★★★★★ (5 ночей — база)
  ↓
Олимпос + Янарташ
  ↓
Каш
  ↓
Олюдениз ★★★★★
  ↓
Фетхие + Саклыкент + Каяккёй
  ↓
Памуккале ★★★★★
  ↓
ФИНИШ: Бодрум / Измир / Даламан (вылет)
```

---

## ФАЗА 1 — Дорога до Анталии (5–6 дней)

### По дням

| День | Откуда → Куда | Км | Ночёвка | Ключевое |
|------|---------------|----|---------|----------|
| 1 | Ереван → Ахалцихе → Карс | ~360 | Карс | Граница Баврa утром, граница Vale/Türkgözü после обеда |
| 2 | Карс (+ Ани) | — | Карс | Целый день на руинах Ани. Самое недооцененное место Армении |
| 3 | Карс → Эрзурум | ~210 | Эрзурум | Короткий перегон. Крепость Эрзурум вечером |
| 4 | Эрзурум → Каппадокия | ~580 | Гёреме | Ранний выезд (6–7 утра). Самый длинный день за поездку |
| 5 | Каппадокия | — | Гёреме | ★ ШАР НА РАССВЕТЕ. Долины, Деринкую |
| 6 | Каппадокия → Анталия | ~590 | Анталия | Через Конью (остановка ~1 час, музей Мевляна) |

> **День 4** — самый тяжёлый перегон. Выехать строго рано, иначе приедешь ночью.  
> Можно разбить: Эрзурум → Сивас (300 км) → ночь → Сивас → Каппадокия (280 км). Тогда фаза 1 = 7 дней.

### Что смотреть по дороге

**Ани (у Карса)** — полдня–день  
Заброшенная армянская столица X века прямо у границы. Пустые соборы, крепостные стены над ущельем, тишина. Трогает. Вход €7. Приехать утром, пока нет жары.

**Каппадокия — программа на 1,5 дня**
- Шар: подъём в 5:30, полёт ~1 час → самый запоминающийся момент поездки
- Деринкую: подземный город на 8 этажей (€10), утром до туристов
- Долина Пашабаг: «грибы» из туфа — 30 минут пешком
- Долина Любви (Göreme): закат — идеально
- Гёреме Музей: скальные церкви с фресками (€18) — можно пропустить если мало времени

**Конья (проезд, ~1–2 часа)**  
Музей Мевляна (дервиши) — вход €3. Достаточно 1,5 часа. Город очень консервативный, одеться скромно.

## ФАЗА 2 — Анталия-база (5 дней)

### 5 дней в Анталии и рядом

| День | Программа | Тип |
|------|-----------|-----|
| 7 | Приезд. Калейчи (старый город), набережная, ужин у воды | Прогулка |
| 8 | Музей Анталии (лучший в Турции) + пляж Кониалти или Лара | Культура + пляж |
| 9 | **Термессос** — горные руины (25 км от города) + водопад Дюден | Природа |
| 10 | **Пергe + Аспендос** — два античных города к востоку + Side | Античность |
| 11 | **Фаселис + Кемер** — руины у моря + последний пляжный день | Море + руины |

### Что смотреть рядом с Анталией

**Термессос** ★★★★★ — 25 км от города  
Руины греческого города в горах на 1000м. Единственное место которое Александр Великий не взял. Пешком 2–3 часа по лесу, вид сверху — мощный. Вход €10. Ехать утром.

**Аспендос** ★★★★ — 47 км к востоку  
Театр II века н.э., вмещает 15 000 человек, сохранность 90%. Один из лучших в мире. Вход €18. 1,5 часа хватит.

**Пергe** ★★★★ — 18 км к востоку  
Большой античный город: колоннады, акрополь, стадион. Вход €12. Взять воду.

**Сайд (Side)** ★★★ — 75 км к востоку  
Руины прямо на пляже. Храм Аполлона у воды — классика. Купаться + руины одновременно. 3–4 часа.

**Фаселис** ★★★★ — 60 км к западу (по дороге к Каш)  
Три пляжа + античный порт в сосновом лесу. Один из самых красивых пляжей региона. Вход €10.

**Водопад Дюден** ★★★ — 14 км от центра  
Нижний Дюден — водопад падает прямо в море. Смотреть с лодки ($10) или с обрыва — бесплатно.

**Каньон Кёпрюлю** ★★★★ — 90 км к северу  
Рафтинг по горной реке (апрель–октябрь). ~$25/чел. Полдня + дорога.

### Жильё в Анталии

## ФАЗА 3 — После Анталии (5–7 дней, на запад)

### По дням

| День | Откуда → Куда | Км | Ночёвка | Ключевое |
|------|---------------|----|---------|----------|
| 12 | Анталия → Олимпос + Янарташ | ~90 | Олимпос/Чирали | ★ Янарташ вечером — вечный огонь из земли |
| 13 | Олимпос → Каш | ~90 | Каш | Лодочная прогулка Кекова — затопленный город |
| 14 | Каш → Олюдениз | ~130 | Олюдениз | ★ Синяя лагуна. Параглайдинг с Бабадага |
| 15 | Олюдениз → Фетхие + Саклыкент | ~15–40 | Фетхие | ★ Каньон Саклыкент + Каяккёй |
| 16 | Фетхие → Памуккале | ~210 | Памуккале | ★ Белые террасы, Иераполис |
| 17 | Памуккале → Бодрум или Измир | ~230–300 | Финиш | Вылет домой |

> Если есть 7-й день: День 17 — Памуккале → **Эфес** (170 км) → Измир (80 км). Эфес — античный Рим в полном масштабе, €30. Летишь из Измира.

### Что смотреть

**Янарташ (Олимпос)** ★★★★★  
25 минут пешком от парковки. Огонь из земли горит с IV века до н.э. — метан выходит через скалы. Идти вечером с фонариком. Рядом руины Олимпоса в лесу (вход $5). Ночевать в Чирали — самая расслабленная деревня Турции.

**Каш** ★★★  
Маленький порт. Главное: **лодочная прогулка к Кекова** — затопленный ликийский город под водой, видно с лодки. Полдня, ~$20/чел. Также ликийские гробницы прямо в скалах над городом.

**Олюдениз** ★★★★★  
Синяя лагуна — защищена природным заповедником. Пляж Белсекиз рядом. **Параглайдинг с горы Бабадаг (1969м)** — 25–40 минут полёта над лагуной, $80–120. Бронировать на месте утром. Летать днём — сильная термика, лучше 9–11 утра.

**Саклыкент** ★★★★★  
Каньон 300м высотой, 18 км длиной. Заходишь по воде (~15–20°C, по щиколотку), идёшь 1–2 часа между стенами. Взять сандалии. Вход €5. 20 минут от Фетхие.

**Каяккёй (Мёртвый город)** ★★★★  
Заброшенный греческий город 1923 года — греки уехали при обмене населением, дома пустые с тех пор. 8 км от Фетхие, вход €3. 1,5–2 часа.

**Памуккале** ★★★★★  
Белые кальциевые террасы ЮНЕСКО. Ходить босиком (обязательно снять обувь у входа). Сверху — Иераполис: греко-римский город с театром и некрополем. Вход €30 на всё. Прийти в 8:00 или после 17:00 — меньше народу. **Бассейн Клеопатры** (руины колонн в термальном бассейне, €20 отдельно) — должен открыться после ремонта к сентябрю 2026, проверить заранее.

**Эфес** ★★★★★ (если будет день 17)  
Крупнейший сохранившийся античный город мира. 2–3 часа минимум. Пойти рано (8:00), летом к 10 уже жарко и толпы. Вход €30. 80 км от Измира.

### Откуда лететь домой

| Аэропорт | Расстояние от Памуккале | Рейсы |
|----------|------------------------|-------|

> Измир — самый удобный, если добавить Эфес. Бодрум — если хочется закончить у моря.

- Взять в PTT: паспорт + копия техпаспорта, депозит ~50 TL
- Пополнять: в любом PTT или онлайн на ogm.gov.tr

## Практика

### Топливо
- Расход: ~6 л/100 км
- Цена в Турции: ~45–50 TL/л (~$1.05–1.10)
- Заправляться полным в Грузии — там дешевле
- Сети: Petrol Ofisi, Опет, Тотал — везде по трассе

### Деньги
- Лиры — снимать в банкоматах (Garanti, İş Bankası, лучший курс)
- Карты Visa/Mastercard — принимают везде
- Наличные USD — держать $200–300 на случай
- Торговаться: на базарах — да. В ресторанах — нет
- Чаевые в ресторане: 10%

### Парковка
- Синяя разметка = платно (паркомат), белая = бесплатно
- Красная линия у тротуара = нельзя совсем
- В туристических зонах (Каппадокия, Памуккале) — платные парковки $2–5

### Museum Pass Turkey
- Цена: €165/чел (~$180)
- Окупается при посещении 5+ объектов из списка
- Включает: Гёреме ОАМ (€18) + Деринкую (€10) + Аспендос (€18) + Эфес (€30) + Иераполис в Памуккале (€30) + Пергe (€12) = €118 без пасса
- Купить у входа в первый объект на маршруте

### Правила дороги
- Ремни — обязательно (штраф сразу)
- "Dur" = полная остановка, не замедление
- Скорость: город 50, трасса 120, магистраль 130 км/ч
- Телефон только хэндсфри
- Нельзя фотографировать военные объекты и КПП

let allMarkers = {};
let altMarkers = [];
let gpsMarker = null;

const TYPE_ICONS = {
  city:'🏙️', wow:'⭐', sight:'🏛️', border:'🛂',
  transport:'✈️', alt:'💜', start:'🚩'
};

function makeMarkerIcon(loc, dayNum) {
  const isWow = loc.type === 'wow';
  const isAlt = loc.type === 'alt';
  const isBorder = loc.type === 'border';
  const phase = loc.phase || 0;
  const color = PHASE_COLORS[phase] || '#64748b';

  if(isAlt) {
    return L.divIcon({
      className:'',
      html:`<div style="width:30px;height:30px;background:#a78bfa;border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:pointer">💜</div>`,
      iconSize:[30,30],iconAnchor:[15,15]
    });
  }
  if(isBorder) {
    return L.divIcon({
      className:'',
      html:`<div style="width:30px;height:30px;background:#64748b;border:2px solid #fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:pointer">🛂</div>`,
      iconSize:[30,30],iconAnchor:[15,15]
    });
  }
  if(isWow) {
    return L.divIcon({
      className:'',
      html:`<div style="width:36px;height:36px;background:${color};border:2.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,.5);cursor:pointer">⭐</div>`,
      iconSize:[36,36],iconAnchor:[18,18]
    });
  }
  const label = dayNum ? dayNum : (TYPE_ICONS[loc.type] || '📍');
  const isNum = !!dayNum;
  return L.divIcon({
    className:'',
    html:`<div style="min-width:30px;height:30px;padding:0 6px;background:${color};border:2px solid #fff;border-radius:${isNum?'50%':'8px'};display:flex;align-items:center;justify-content:center;font-size:${isNum?'12px':'14px'};font-weight:${isNum?700:400};color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:pointer">${label}</div>`,
    iconSize:[30,30],iconAnchor:[15,15]
  });
}

function buildPopupHTML(locId, loc) {
  const dayInfo = DAYS.find(d=>d.locs && d.locs.includes(locId) && d.main===locId);
  const dayNum = dayInfo ? `День ${dayInfo.n}` : '';
  return `<div>
    <div class="pop-title">${loc.name}</div>
    <div class="pop-sub">${dayNum ? dayNum+' · ' : ''}${loc.type==='wow'?'★ WOW место':loc.type==='border'?'Граница':loc.type==='alt'?'Альтернатива':'Остановка'}</div>
    <button class="pop-more" onclick="showDetail('${locId}')">Подробнее →</button>
  </div>`;
}

function renderMarkers() {
  // Night stop markers (numbered by day)
  DAYS.forEach(d=>{
    const loc = LOCS[d.main];
    if(!loc) return;
    if(allMarkers[d.main]) return; // already added
    const m = L.marker(loc.coords, {icon: makeMarkerIcon(loc, d.n)}).addTo(map);
    m.bindPopup(buildPopupHTML(d.main, loc));
    m.on('click',()=>showDetail(d.main));
    allMarkers[d.main] = m;
  });

  // Additional sight markers (non-main locs in each day)
  DAYS.forEach(d=>{
    d.locs.forEach(lid=>{
      if(lid === d.main) return;
      const loc = LOCS[lid];
      if(!loc || allMarkers[lid]) return;
      const m = L.marker(loc.coords, {icon: makeMarkerIcon(loc)});
      m.bindPopup(buildPopupHTML(lid, loc));
      m.on('click',()=>showDetail(lid));
      m.addTo(map);
      allMarkers[lid] = m;
    });
  });
}

function renderAltMarkers() {
  altMarkers.forEach(m=>map.removeLayer(m));
  altMarkers = [];
  ALTS.forEach(a=>{
    const m = L.marker(a.coords, {
      icon: L.divIcon({
        className:'',
        html:`<div style="width:32px;height:32px;background:#7c3aed;border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:pointer">💜</div>`,
        iconSize:[32,32],iconAnchor:[16,16]
      })
    });
    m.bindPopup(`<div>
      <div class="pop-title">${a.name}</div>
      <div class="pop-sub">Альтернативное место</div>
      <div style="font-size:11px;color:var(--muted);margin:6px 0">${a.desc}</div>
      <button class="pop-more" onclick="showAltDetail('${a.id}')">Подробнее →</button>
    </div>`);
    altMarkers.push(m);
  });
}

let currentPhase = 0;
let currentDay = 1;

function filterPhase(p) {
  currentPhase = p;
  ['tab0','tab1','tab2','tab3'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('a', i===p);
  });
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('daylist');
  const days = currentPhase===0 ? DAYS : DAYS.filter(d=>d.phase===currentPhase);
  list.innerHTML = days.map(d=>{
    const ph = PHASE_COLORS[d.phase];
    const wows = d.wow>=5?'⭐⭐⭐':d.wow>=4?'⭐⭐':d.wow>=3?'⭐':'';
    return `<div class="ditem${d.n===currentDay?' a':''}" onclick="selectDay(${d.n})">
      <div class="drow">
        <div class="dnum" style="background:${ph}">${d.n}</div>
        <div class="dtitle">${d.from} → ${d.to}</div>
        <div class="dkm">${d.km>0?d.km+' км':'дн.'}</div>
      </div>
      <div class="dsub">${d.sum}</div>
      <div class="dwow">${wows}</div>
    </div>`;
  }).join('');
}

function closeSidebar() {
  document.getElementById('sb').classList.remove('mob-open');
  document.getElementById('mob-overlay').classList.remove('show');
}
function openSidebar() {
  document.getElementById('sb').classList.add('mob-open');
  document.getElementById('mob-overlay').classList.add('show');
}

function selectDay(n) {
  currentDay = n;
  renderSidebar();
  if(window.innerWidth <= 768) closeSidebar();
  const d = DAYS.find(x=>x.n===n);
  if(!d) return;
  const loc = LOCS[d.main];
  if(loc) {
    map.flyTo(loc.coords, 11, {duration:1.2});
    setTimeout(()=>{
      if(allMarkers[d.main]) allMarkers[d.main].openPopup();
    }, 1400);
    showDetail(d.main);
  }
}

          <div class="hotel-stars">${h.stars}</div>
          <div class="hotel-price">${h.price}</div>
          <a class="hotel-book" href="${bookUrl}" target="_blank">🌐 Booking.com</a>

  if(loc.sights && loc.sights.length) {

// CONTROLS

let layers = {sat:false, danger:false, alt:false};
let infoRendered = false;

function escapeHtml(value) {
  return value.replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  })[ch]);
}

function renderInlineMarkdown(value) {
  return escapeHtml(value)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>');
}

function splitTableRow(line) {
  return line.trim().replace(/^\|/, '').replace(/\|$/, '')
    .split('|').map(cell => cell.trim());
}

function renderInfoMarkdown(markdown) {
  const lines = markdown.replace(/\r\n/g, '\n').split('\n');
  let html = '';
  let list = null;
  let inCode = false;
  let codeLines = [];
  const closeList = () => {
    if(list) { html += `</${list}>`; list = null; }
  };

  for(let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    if(trimmed.startsWith('```')) {
      closeList();
      if(inCode) {
        html += `<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`;
        codeLines = [];
        inCode = false;
      } else {
        inCode = true;
      }
      continue;
    }

    if(inCode) { codeLines.push(line); continue; }
    if(!trimmed) { closeList(); continue; }

    if(/^\|.*\|$/.test(trimmed) && i + 1 < lines.length &&
       /^\|?[\s:-]+(?:\|[\s:-]+)+\|?$/.test(lines[i + 1].trim())) {
      closeList();
      const headers = splitTableRow(trimmed);
      const rows = [];
      i += 2;
      while(i < lines.length && /^\|.*\|$/.test(lines[i].trim())) {
        rows.push(splitTableRow(lines[i]));
        i++;
      }
      i--;
      html += '<div class="md-table-wrap"><table><thead><tr>';
      html += headers.map(cell => `<th>${renderInlineMarkdown(cell)}</th>`).join('');
      html += '</tr></thead><tbody>';
      html += rows.map(row => `<tr>${headers.map((_, idx) =>
        `<td>${renderInlineMarkdown(row[idx] || '')}</td>`).join('')}</tr>`).join('');
      html += '</tbody></table></div>';
      continue;
    }

    if(/^---+$/.test(trimmed)) { closeList(); html += '<hr>'; continue; }

    const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
    if(heading) {
      closeList();
      const level = heading[1].length;
      html += `<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`;
      continue;
    }

    if(trimmed.startsWith('> ')) {
      closeList();
      html += `<blockquote>${renderInlineMarkdown(trimmed.slice(2))}</blockquote>`;
      continue;
    }

    const ordered = trimmed.match(/^\d+\.\s+(.+)$/);
    if(ordered) {
      if(list !== 'ol') { closeList(); list = 'ol'; html += '<ol>'; }
      html += `<li>${renderInlineMarkdown(ordered[1])}</li>`;
      continue;
    }

    const unordered = trimmed.match(/^[-*]\s+(.+)$/);
    if(unordered) {
      if(list !== 'ul') { closeList(); list = 'ul'; html += '<ul>'; }
      html += `<li>${renderInlineMarkdown(unordered[1])}</li>`;
      continue;
    }

    closeList();
    html += `<p>${renderInlineMarkdown(trimmed)}</p>`;
  }

  closeList();
  if(inCode) html += `<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`;
  return html;
}

function renderTripInfo() {
  if(infoRendered) return;
  const source = document.getElementById('trip-info-source');
  const content = document.getElementById('info-content');
  content.innerHTML = renderInfoMarkdown(source.textContent.trim());
  infoRendered = true;
}

function openInfoModal() {
  renderTripInfo();
  closeDetail();
  const modal = document.getElementById('info-modal');
  modal.classList.add('open');
  modal.setAttribute('aria-hidden', 'false');
  document.body.classList.add('body-info-open');
}

function closeInfoModal() {
  const modal = document.getElementById('info-modal');
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('body-info-open');
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeInfoModal();
});

function toggleLayer(name) {
  layers[name] = !layers[name];
  const btn = document.getElementById('btn-'+name);
  btn.classList.toggle('on', layers[name]);

  if(name==='sat') {
    if(layers.sat) { map.removeLayer(cartoLayer); satLayer.addTo(map); }
    else { map.removeLayer(satLayer); cartoLayer.addTo(map); }
  }
  if(name==='danger') {
    if(layers.danger) { dangerLayer.addTo(map); dangerLabel.addTo(map); }
    else { map.removeLayer(dangerLayer); map.removeLayer(dangerLabel); }
  }
  if(name==='alt') {
    if(layers.alt) { altMarkers.forEach(m=>m.addTo(map)); }
    else { altMarkers.forEach(m=>map.removeLayer(m)); }
  }
}

function gotoGPS() {
  if(!navigator.geolocation) { alert('Геолокация не поддерживается.'); return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude, lon=pos.coords.longitude;
    map.flyTo([lat,lon],14,{duration:1.5});
    if(gpsMarker) map.removeLayer(gpsMarker);
    gpsMarker = L.marker([lat,lon],{
      icon:L.divIcon({
        className:'',
        html:'<div class="gps-dot"></div>',
        iconSize:[14,14],iconAnchor:[7,7]
      })
    }).addTo(map).bindPopup('📍 Вы здесь').openPopup();
  }, err=>{
    alert('Не удалось получить местоположение. Разрешите доступ к геолокации.');
  });
}

// Close detail when clicking map
map.on('click',()=>closeDetail());

function updateOnlineStatus() {
  document.getElementById('offline-badge').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => {
      console.warn('Service worker registration failed:', err);
    });
  });
}
